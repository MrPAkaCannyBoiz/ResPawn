#version: '3.8'

services:

  rabbitmq:
    image: rabbitmq:latest
    hostname: respawn_rabbitmq
    container_name: respawn_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
      


  postgres:
    image: postgres:latest
    container_name: postgres_respawn
    environment:
      # These ${VARIABLES} are read from the .env file in the same directory as docker-compose.yml
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      # Format is: host_path : container_path
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/postgresql # Persist data on host machine
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  grpc-server-springboot-service:
      build:
        context: . # starts from the directory of the docker-compose.yml file
        dockerfile: java_projects/ResPawn/Dockerfile
      container_name: respawn-grpc-server
      ports:
        - "8080:8080"
        - "6767:6767"

        # copy all application properties that use ${...} 
        # syntax to read from environment variables, as spring boot in the 
        # container won't have access to the .env file directly, 
        # but will read the .env variables passed in through docker-compose    
      environment:
        # --- Database (Matches application.properties placeholders) ---
        DB_URL: ${DOCKER_DB_URL}
        DB_USERNAME: ${DB_USERNAME}
        DB_PASSWORD: ${DB_PASSWORD}
        DB_DRIVER: org.postgresql.Driver
        SPRING_JPA_HIBERNATE_DDL_AUTO: update
        SPRING_GRPC_SERVER_PORT: 6767

        # gRPC & Server SSL 
        IS_SSL_ENABLED: "true"
        KEYSTORE_LOCATION: ${RELATIVE_KEY_PATH}
        SSL_KEYSTORE_PATH: ${RELATIVE_KEY_PATH}
        KEYSTORE_PASSWORD: ${KEY_PASSWORD}
        SSL_KEYSTORE_PASSWORD: ${KEY_PASSWORD}
        KEY_PASSWORD: ${KEY_PASSWORD}
      
        # RabbitMQ
        SPRING_PROFILES_ACTIVE: rabbitmq
        SPRING_RABBITMQ_HOST: respawn_rabbitmq
        SPRING_RABBITMQ_PORT: 5672
        SPRING_RABBITMQ_USERNAME: guest
        SPRING_RABBITMQ_PASSWORD: guest

      volumes:
        # Mapped ./self_signed_cert (host) to /app/self_signed_certs (container)
        - ./self_signed_certs:/app/self_signed_certs:ro
      depends_on:
        postgres:
          condition: service_healthy

    
  grpc-client-dotnet-services:
    build:
      context: .
      dockerfile: C_sharp/Server/WebAPI/Dockerfile
    container_name: respawn-grpc-client
    ports:
      - "6760:6760"
      - "6761:6761"
    environment:
      # run in development mode to enable hot reload and other dev features
      ASPNETCORE_ENVIRONMENT: Development # remove it for production
      # gRPC target — must be the compose service name, not localhost, so the client
      # container can reach the Java gRPC server. TrustSelfSigned bypasses cert
      # validation because the server presents the project's self-signed cert.
      GrpcServer__Address: https://grpc-server-springboot-service:6767
      GrpcServer__TrustSelfSigned: "true"
      # Key and certificate properties for gRPC client TLS configuration + JWT properties for authentication
      PFX_FILE_PATH: ${PFX_FILE_PATH}
      PFX_PASSWORD: ${PFX_PASSWORD}
      JWT__KEY: ${JWT__KEY}
      JWT__ISSUER: ${JWT__ISSUER}
      JWT__AUDIENCE: ${JWT__AUDIENCE}
      JWT__SUBJECT: ${JWT__SUBJECT}
      # Kafka env var removed — WebAPI has no message producer code
      
    volumes:
      # Mapped ./self_signed_cert (host) to /app/self_signed_certs (container)
      - ./self_signed_certs:/app/self_signed_certs:ro # :ro means read-only
    depends_on:
      grpc-server-springboot-service:
        condition: service_started
  

  message-worker:
    build:
      context: .
      dockerfile: C_sharp/Server/MessageConsumer/Dockerfile
    container_name: respawn-message-worker
    environment:
      RabbitMQ__Host: respawn_rabbitmq
      RabbitMQ__Username: guest
      RabbitMQ__Password: guest
    depends_on:
      rabbitmq:
        condition: service_healthy


  blazor-frontend:
    build:
      context: .
      dockerfile: C_sharp/Client/BlazorApp/Dockerfile
    container_name: respawn-blazor-frontend
    ports:
      - "5195:5195"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      # Must be HTTPS: the WebAPI login sets JwtCookie with Secure=true, which the
      # server-side Blazor HttpClient cookie jar rejects on non-TLS responses.
      WebApiBaseUrl: https://grpc-client-dotnet-services:6760
      WebApi__TrustSelfSigned: "true"
    depends_on:
      grpc-client-dotnet-services:
        condition: service_started


  react-frontend:
    build:
      context: ./react-frontend
      dockerfile: Dockerfile
    container_name: respawn-react-frontend
    ports:
      - "3000:3000"
    depends_on:
      grpc-client-dotnet-services:
        condition: service_started


volumes: # Define named volumes for data persistence
  rabbitmq_data:
    name: rabbitmq_data
  db_data:
    name: db_data
  self_signed_certs:
    name: self_signed_certs