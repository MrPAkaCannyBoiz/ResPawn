name: dotnet-test

on:
  push:
    branches:
      - '**'
    paths:
      - 'C_sharp/**'
      - 'Shared_proto/**'
  pull_request:
    branches:
      - '**'
    paths:
      - 'C_sharp/**'
      - 'Shared_proto/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./C_sharp/Server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore MessageConsumer dependencies
        run: dotnet restore MessageConsumer/MessageConsumer.csproj

      - name: Build MessageConsumer
        run: dotnet build MessageConsumer/MessageConsumer.csproj --no-restore -c Release

      - name: Restore test project
        run: dotnet restore MessageConsumer.Tests/MessageConsumer.Tests.csproj

      - name: Run tests with coverage
        run: |
          dotnet test MessageConsumer.Tests/MessageConsumer.Tests.csproj \
            --no-restore \
            --settings MessageConsumer.Tests/coverlet.runsettings \
            --collect:"XPlat Code Coverage" \
            --results-directory ../../coverage

      - name: Install reportgenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate coverage report and check 80% threshold
        run: |
          reportgenerator \
            -reports:"../../coverage/**/coverage.cobertura.xml" \
            -targetdir:"../../coverage/report" \
            -reporttypes:"TextSummary;Html" \
            -minimumcoverage:80
          cat ../../coverage/report/Summary.txt

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-coverage-report
          path: coverage/report/

  build-webapi:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore and build WebAPI
        run: dotnet build C_sharp/Server/WebAPI/WebAPI.csproj -c Release

  build-blazor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore and build BlazorApp
        run: dotnet build C_sharp/Client/BlazorApp/BlazorApp.csproj -c Release
