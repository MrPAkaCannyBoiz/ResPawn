name: react-frontend

on:
  push:
    branches:
      - '**'
    paths:
      - 'react-frontend/**'
  pull_request:
    branches:
      - '**'
    paths:
      - 'react-frontend/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./react-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: react-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-frontend-dist
          path: react-frontend/dist/

  integration-test:
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start backend services
        run: docker compose up -d postgres rabbitmq grpc-server-springboot-service grpc-client-dotnet-services
        env:
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DOCKER_DB_URL: ${{ secrets.DOCKER_DB_URL }}
          RELATIVE_KEY_PATH: ${{ secrets.RELATIVE_KEY_PATH }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          PFX_FILE_PATH: ${{ secrets.PFX_FILE_PATH }}
          PFX_PASSWORD: ${{ secrets.PFX_PASSWORD }}
          JWT__KEY: ${{ secrets.JWT__KEY }}
          JWT__ISSUER: ${{ secrets.JWT__ISSUER }}
          JWT__AUDIENCE: ${{ secrets.JWT__AUDIENCE }}
          JWT__SUBJECT: ${{ secrets.JWT__SUBJECT }}

      - name: Wait for WebAPI to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sk https://localhost:6760/api/products >/dev/null 2>&1; then
              echo "WebAPI is ready"
              exit 0
            fi
            echo "Waiting for WebAPI... ($i/30)"
            sleep 5
          done
          echo "WebAPI did not become ready"
          exit 1

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: react-frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./react-frontend
        run: npm ci

      - name: Run integration tests
        working-directory: ./react-frontend
        run: npm run test:integration -- --run
        env:
          VITE_API_BASE_URL: https://localhost:6760
          NODE_TLS_REJECT_UNAUTHORIZED: '0'

      - name: Stop backend services
        if: always()
        run: docker compose down -v
