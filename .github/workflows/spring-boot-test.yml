name: spring-boot-test
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

  # Add default working directory for all run steps in this job
    defaults:
      run:
        working-directory: ./java_projects/ResPawn

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      # -B flag is for batch mode, which is non-interactive and better for CI environments
      # clean verify: compiles, runs tests, and enforces 80% instruction coverage via Jacoco
      - name: Maven Clean Verify with Coverage Check
        run: mvn -B clean verify

      - name: Protobuf Codegen Check
        run: mvn -B protobuf:compile || echo "No protobuf plugin configured"

      - name: Upload Jacoco Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: java_projects/ResPawn/target/site/jacoco/

