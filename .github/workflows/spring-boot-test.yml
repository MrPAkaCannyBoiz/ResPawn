name: spring-boot-test
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

  # Add default working directory for all run steps in this job
    defaults:
      run:
        working-directory: ./java_projects/ResPawn

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      # -B flag is for batch mode, which is non-interactive and better for CI environments
      - name: Maven Clean and Compile
      # check if project compiles successfully (no syntax errors, missing dependencies, etc.)
        run: mvn -B clean compile 

      - name: Maven Test (skip if none)
      # run tests if they exist, but don't fail the workflow if no tests are found
        run: mvn -B test || echo "No tests found, skipping"

      - name: Protobuf Codegen Check
        run: mvn -B protobuf:compile || echo "No protobuf plugin configured"

