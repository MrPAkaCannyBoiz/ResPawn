name: spring-boot-test

on:
  push:
    branches:
      - '**'
    paths:
      - 'java_projects/**'
      - 'Shared_proto/**'
  pull_request:
    branches:
      - '**'
    paths:
      - 'java_projects/**'
      - 'Shared_proto/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./java_projects/ResPawn

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'

      - name: Maven Clean Verify with Coverage Check
        run: mvn -B clean verify

      - name: Protobuf Codegen Check
        run: mvn -B protobuf:compile || echo "No protobuf plugin configured"

      - name: Upload Jacoco Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: java_projects/ResPawn/target/site/jacoco/
