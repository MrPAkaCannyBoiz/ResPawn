name: Build, Startup Check

on:
  push:
    branches:
      - '**' # all branches
  pull_request:
    branches:
      - '**' # all branches

jobs:
  build:
    runs-on: ubuntu-latest

     # Add default working directory for all run steps in this job
    defaults:
      run:
        working-directory: ./java_projects/ReSpawnMarket

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      # -B flag is for batch mode, which is non-interactive and better for CI environments
      - name: Maven Clean and Compile (Spring Boot)
        run: mvn -B clean compile

      - name: Protobuf Codegen Check
        run: mvn -B protobuf:compile || echo "No protobuf plugin configured"

      - name: Startup Check (Spring Boot)
        run: |
          mvn -q -DskipTests spring-boot:run &
          APP_PID=$!
          echo "Waiting for Spring Boot to start..."
          sleep 15
          
          if ps -p $APP_PID > /dev/null
          then
            echo "Spring Boot started successfully."
            kill $APP_PID
          else
            echo "Spring Boot failed to start!"
            exit 1
          fi
