# Confluent Cloud bootstrap (overrides the localhost default in application.properties)
spring.kafka.bootstrap-servers=pkc-8gv997.austriaeast.azure.confluent.cloud:9092
spring.kafka.consumer.bootstrap-servers=pkc-8gv997.austriaeast.azure.confluent.cloud:9092
spring.kafka.producer.bootstrap-servers=pkc-8gv997.austriaeast.azure.confluent.cloud:9092

# SASL_SSL auth - credentials from environment variables (CONFLUENT_API_KEY, CONFLUENT_API_SECRET)
spring.kafka.properties.security.protocol=SASL_SSL
spring.kafka.properties.sasl.mechanism=PLAIN
spring.kafka.properties.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username="${CONFLUENT_API_KEY}" password="${CONFLUENT_API_SECRET}";
