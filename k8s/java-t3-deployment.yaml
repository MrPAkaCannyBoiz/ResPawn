apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-t3-deployment
  labels: 
    app: java-t3-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: java-t3-deployment
  template:
    metadata:
      name: java-t3-pod
      labels:
        app: java-t3-deployment
    spec:
      containers:
        - name: respawn-grpc-server
          image: respawn-grpc-server:latest
          ports:
            - containerPort: 8080
            - containerPort: 6767
          env:
            # --- Database (Matches application.properties placeholders) ---
            - name: DB_URL
              valueFrom:
                configMapKeyRef:
                  name: java-t3-config
                  key: DOCKER_DB_URL
            - name: DB_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: java-t3-config
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: java-t3-secrets
                  key: DB_PASSWORD
            - name: DB_DRIVER
              value: org.postgresql.Driver
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: update
            - name: SPRING_GRPC_SERVER_PORT
              value: "6767"

            # gRPC & Server SSL 
            - name: IS_SSL_ENABLED
              value: "true"
            - name: KEYSTORE_LOCATION
              valueFrom:
                configMapKeyRef:
                  name: java-t3-config
                  key: RELATIVE_KEY_PATH
            - name: SSL_KEYSTORE_PATH
              valueFrom:
                configMapKeyRef:
                  name: java-t3-config
                  key: RELATIVE_KEY_PATH
            - name: KEYSTORE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: java-t3-secrets
                  key: KEY_PASSWORD
            - name: SSL_KEYSTORE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: java-t3-secrets
                  key: KEY_PASSWORD
            - name: KEY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: java-t3-secrets
                  key: KEY_PASSWORD
            
            # Kafka (Matches application.properties placeholders)
            # Pointing to the Kafka container's internal hostname and port, 
            # not localhost, since this is from the perspective of the Spring Boot container
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: respawn_kafka:9092