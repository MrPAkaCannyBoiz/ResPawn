# Production override — merges with docker-compose.yml
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.prod up -d --build

services:

  rabbitmq:
    restart: unless-stopped
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}

  postgres:
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"

  grpc-server-springboot-service:
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:6767:6767"
    environment:
      SPRING_PROFILES_ACTIVE: rabbitmq,prod
      SPRING_RABBITMQ_HOST: respawn_rabbitmq
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy

  grpc-client-dotnet-services:
    restart: unless-stopped
    ports:
      - "127.0.0.1:6760:6760"
      - "127.0.0.1:6761:6761"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      GrpcServer__TrustSelfSigned: "false"

  message-worker:
    restart: unless-stopped
    environment:
      DOTNET_ENVIRONMENT: Production
      RabbitMQ__Host: respawn_rabbitmq
      RabbitMQ__Username: ${RABBITMQ_USERNAME}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD}
      Smtp__Username: ${SMTP__USERNAME}
      Smtp__Password: ${SMTP__PASSWORD}

  blazor-frontend:
    restart: unless-stopped
    ports:
      - "127.0.0.1:5195:5195"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      WebApi__TrustSelfSigned: "false"
