# Production override — merges with docker-compose.yml
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.prod pull
#        docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.prod up -d

services:
  # ---------------------------------------------------------
  # BACKEND INFRASTRUCTURE (Completely Isolated)
  # ---------------------------------------------------------
  rabbitmq:
    image: rabbitmq:management # Use the management tag if you want the UI
    container_name: respawn_rabbitmq
    restart: unless-stopped
    # NO PORTS! We don't want the internet hitting your message broker.
    environment:
      # Change these from 'guest' in your .env file for production!
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - default

  postgres:
    image: postgres:latest
    container_name: postgres_respawn
    restart: unless-stopped
    # NO PORTS! Only your Spring Boot app can talk to this DB.
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/postgresql
    networks:
      - default

  # ---------------------------------------------------------
  # INTERNAL MICROSERVICES (No Public Access)
  # ---------------------------------------------------------
  grpc-server-springboot-service:
    image: ghcr.io/mrpakacannyboiz/respawn-grpc-server:latest
    build: !reset null
    container_name: respawn-grpc-server
    restart: unless-stopped
    expose:
      - "6767"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB} # Internal routing
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DRIVER: org.postgresql.Driver
      SPRING_RABBITMQ_HOST: ${RABBITMQ_HOST} # Internal routing
      SPRING_RABBITMQ_PORT: ${RABBITMQ_PORT}
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      SEED_RESELLER_NAME: ${SEED_RESELLER_NAME:-}
      SEED_RESELLER_USERNAME: ${SEED_RESELLER_USERNAME:-}
      SEED_RESELLER_PASSWORD: ${SEED_RESELLER_PASSWORD:-}
    depends_on:
      - postgres
      - rabbitmq
    networks:
      - default

  message-worker:
    image: ghcr.io/mrpakacannyboiz/respawn-message-worker:latest
    build: !reset null
    container_name: respawn-message-worker
    restart: unless-stopped
    environment:
      RabbitMQ__Host: ${RABBITMQ__HOST}
      RabbitMQ__Username: ${RABBITMQ_USERNAME}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD}
    depends_on:
      - rabbitmq
    networks:
      - default

  # ---------------------------------------------------------
  # PUBLIC FACING SERVICES (Plugged into Caddy)
  # ---------------------------------------------------------
  grpc-client-dotnet-services:
    image: ghcr.io/mrpakacannyboiz/respawn-grpc-client:latest
    build: !reset null
    container_name: respawn-grpc-client
    restart: unless-stopped
    expose:
      - "6760" # This is the port you will put in your Caddyfile!
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      GrpcServer__Address: ${GrpcServer__Address}
      JWT__KEY: ${JWT__KEY}
      JWT__ISSUER: ${JWT__ISSUER}
      JWT__AUDIENCE: ${JWT__AUDIENCE}
      JWT__SUBJECT: ${JWT__SUBJECT}
      Cors__AllowedOrigins__0: ${CORS_ORIGIN}
    depends_on:
      - grpc-server-springboot-service
    networks:
      - default
      - caddy_net # <--- THE CRITICAL CONNECTION

  # React frontend is deployed separately (Vercel/Netlify/Cloudflare Pages)
  # It calls the API via: https://api.cannyboiz.com
  # Set VITE_API_BASE_URL=https://api.cannyboiz.com at build time on the hosting platform

volumes:
  rabbitmq_data:
  db_data:

networks:
  caddy_net:
    external: true
    name: caddy_net